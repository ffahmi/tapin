<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembayaran Gagal</title>

    <link rel="stylesheet" href="./dist/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-100 font-sans">
    <!-- Container -->
    <div class="flex flex-col items-center justify-start max-w-[480px] mx-auto">
      <!-- Logo -->
      <div
        class="flex items-center gap-3 px-4 py-4 border-b bg-tertiery text-white w-full"
      >
        <img
          src="https://tapinbirojasa.co.id/logo.png"
          class="w-auto h-8 rounded-full object-cover mx-auto"
        />
      </div>
      <!-- Card -->
      <div class="w-full bg-gray-50 shadow-md p-6 min-h-screen">
        <div class="w-full">
          <!-- Success Icon -->
          <div
            class="flex justify-center mb-3 bg-red-100 w-fit mx-auto p-3 rounded-full"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="size-16 text-red-600"
            >
              <path
                fill-rule="evenodd"
                d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-1.72 6.97a.75.75 0 1 0-1.06 1.06L10.94 12l-1.72 1.72a.75.75 0 1 0 1.06 1.06L12 13.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L13.06 12l1.72-1.72a.75.75 0 1 0-1.06-1.06L12 10.94l-1.72-1.72Z"
                clip-rule="evenodd"
              />
            </svg>
          </div>

          <!-- Title -->
          <h2 class="text-center text-2xl font-semibold text-gray-800 mb-2">
            Pembayaran Gagal
          </h2>

          <p class="text-center text-gray-500 text-sm mb-6">
            Maaf, pembayaran Anda gagal. Silakan coba kembali atau gunakan
            metode pembayaran lain.
          </p>
        </div>

        <!-- Detail Box -->
        <div class="bg-white rounded-lg p-6 mb-6 mt-6">
          <h3
            class="text-xs font-semibold text-gray-500 mb-4 tracking-wide border-b pb-4"
          >
            DETAIL PEMBAYARAN
          </h3>

          <!-- Row -->
          <div class="flex justify-between text-sm mb-5">
            <div>
              <p class="text-gray-400 text-sm">No. Pesanan</p>
              <p class="font-semibold text-gray-800">#TRX-8829410</p>
            </div>
            <div class="text-right">
              <p class="text-gray-400 text-sm">Tanggal Pembayaran</p>
              <p class="font-semibold text-gray-800">Oct 24, 2023</p>
            </div>
          </div>

          <!-- Vehicle -->
          <div class="bg-gray-50 rounded-lg p-3 flex items-center gap-3 mb-5">
            <div
              class="w-10 h-10 bg-gray-200 rounded-lg flex items-center justify-center"
            ></div>
            <div>
              <p class="text-sm text-gray-400">NOMOR KENDARAAN</p>
              <p class="font-semibold text-gray-800 text-xl">B 1234 ABC</p>
            </div>
          </div>

          <!-- Total -->
          <div>
            <p class="text-sm text-gray-400 mb-1">Total Pembayaran</p>
            <p class="text-2xl font-bold text-black">Rp 3.450.000</p>
          </div>

          <!-- Status -->
          <div class="mt-4">
            <span
              class="inline-flex items-center gap-2 bg-red-100 text-red-600 text-xs font-medium px-3 py-2 rounded-md"
            >
              ● Gagal
            </span>
          </div>
        </div>

        <!-- Button -->
        <a href="index.html"
          class="w-full bg-blue-600 flex gap-x-2 hover:bg-blue-700 text-white py-3 rounded-lg items-center justify-center gap-2 transition mt-6"
        >
          
          <span>Kembali Ke Halaman utama</span>
        </a>
      </div>
    </div>
  </body>
</html>
